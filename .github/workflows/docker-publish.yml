name: Publish Release Docker Image

on:
  release:
    types: [published]
  workflow_dispatch: # Allows manual trigger from Actions tab

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@3041de560034e262f551986c197b17f3698d274e # v5.2.0
        with:
          go-version-file: go.mod
          cache: true
      
      - name: Compile ReShell binary
        run: |
          CGO_ENABLED=0 GOOS=linux go build -o reshell .

      - name: Log in to the Container registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@369eb7b34f4e17316c3e7a2b1639f4a57c913d33 # v5.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=beta
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@ca877d9245402d153c64d2fa81020c3b4fc9d7e5 # v5.0.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
